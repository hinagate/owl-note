<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OWL-Note</title>
  <link rel="stylesheet" href="katex.css" />
  <link rel="stylesheet" href="github.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="toolbar"></div>
  <div id="panes">
    <aside id="sidebar"></aside>
    <section id="note-list"></section>
    <main id="editor"></main>

  <script src="app.js"></script>
</body>
</html>
